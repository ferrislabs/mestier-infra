apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Env-agnostic base for RustFS (S3-compatible object storage), standalone mode.
# The `mestier-rustfs-credentials` secret is created out-of-band (see README) and
# is intentionally NOT part of this kustomization — no secrets in git.
resources:
  - pvc.yaml
  - deployment.yaml
  - service.yaml
