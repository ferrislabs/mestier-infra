apiVersion: apps/v1
kind: Deployment
metadata:
  name: mestier-rustfs
  labels:
    app.kubernetes.io/name: mestier-rustfs
spec:
  replicas: 1
  # Single RWO PVC: never run two pods against the same volume — recreate on update.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mestier-rustfs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mestier-rustfs
    spec:
      securityContext:
        # RustFS image runs as the non-root `rustfs` user (uid 10001); fsGroup
        # makes the data PVC writable.
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        runAsNonRoot: true
      containers:
        - name: rustfs
          # S3-compatible object storage, single-node standalone mode.
          image: rustfs/rustfs:1.0.0-beta.8
          ports:
            - name: s3
              containerPort: 9000
            - name: console
              containerPort: 9001
          env:
            - name: RUSTFS_ADDRESS
              value: ":9000"
            - name: RUSTFS_CONSOLE_ENABLE
              value: "true"
            - name: RUSTFS_CONSOLE_ADDRESS
              value: ":9001"
            # Standalone: a single local volume backs the object store.
            - name: RUSTFS_VOLUMES
              value: "/data"
            - name: RUSTFS_OBS_LOG_DIRECTORY
              value: "/logs"
            # Credentials come from a secret created out-of-band (see README) —
            # never committed to git, consistent with the CNPG-secret pattern.
            - name: RUSTFS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mestier-rustfs-credentials
                  key: accessKey
            - name: RUSTFS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: mestier-rustfs-credentials
                  key: secretKey
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: s3
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: s3
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
            - name: logs
              mountPath: /logs
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mestier-rustfs
        - name: logs
          # Logs are disposable — no need to persist them on the PVC.
          emptyDir: {}
