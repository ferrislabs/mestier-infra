apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Env-agnostic base for the Mestier CNPG database. Environments overlay this
# and set the target namespace (and any per-env patches: storage, instances...).
# CNPG auto-creates database `app` + user `app` and the secret `mestier-db-app`.
resources:
  - cluster.yaml
