apiVersion: v1
kind: Service
metadata:
  name: mestier-redis
  labels:
    app.kubernetes.io/name: mestier-redis
spec:
  # ClusterIP: reachable in-namespace at mestier-redis:6379.
  selector:
    app.kubernetes.io/name: mestier-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
