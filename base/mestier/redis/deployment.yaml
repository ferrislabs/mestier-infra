apiVersion: apps/v1
kind: Deployment
metadata:
  name: mestier-redis
  labels:
    app.kubernetes.io/name: mestier-redis
spec:
  replicas: 1
  # Single RWO PVC: never run two pods against the same volume — recreate on update.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mestier-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mestier-redis
    spec:
      securityContext:
        # Official redis:alpine runs as uid/gid 999; fsGroup makes the PVC writable.
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        runAsNonRoot: true
      containers:
        - name: redis
          # Official image (no Bitnami). Simple single-node, AOF persistence enabled.
          image: redis:7.4-alpine
          args:
            - --appendonly
            - "yes"
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mestier-redis
