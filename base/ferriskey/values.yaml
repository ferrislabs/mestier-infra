# Ferriskey Helm values — common across all environments.
# Chart: oci://ghcr.io/ferriskey/charts/ferriskey (version pinned in the Application).
# Per-env files override: publicHost, allowedOrigins, httpRoute parentRefs.

# Use the external CloudNativePG cluster instead of the chart's bundled postgres.
postgresql:
  enabled: false

database:
  # Service name is identical in every namespace (CNPG `<cluster>-rw`), and the
  # API runs in the same namespace as its database — so this is env-agnostic.
  host: ferriskey-db-rw
  port: 5432
  name: ferriskey
  user: ferriskey
  passwordSecret:
    # Secret generated by CNPG for the `ferriskey-db` cluster app role.
    create: false
    name: ferriskey-db-app
    key: password

api:
  admin:
    email: admin@mestier.fr
    username: admin
    # passwordSecret.create defaults to true → secret `ferriskey-api-admin` (key `password`)
    # generated on first install. Retrieve with:
    #   kubectl get secret -n <ns> ferriskey-api-admin -o jsonpath='{.data.password}' | base64 -d
  webapp:
    protocol: https

webapp:
  api:
    protocol: https

databaseMigrations:
  # Run migrations as an ArgoCD PreSync hook (the DB must be reachable first —
  # the ferriskey-db Application syncs in an earlier sync-wave).
  annotations:
    argocd.argoproj.io/hook: PreSync

gatewayAPI:
  httpRoute:
    enabled: true
    # parentRefs are env-specific (which Gateway terminates TLS for the host) —
    # set in the per-env values file.
