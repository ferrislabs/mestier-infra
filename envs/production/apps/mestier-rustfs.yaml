apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mestier-rustfs
  namespace: argocd
  annotations:
    # Sync-wave 0: data layer is provisioned before the Mestier app (wave 1+).
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/ferrislabs/mestier-infra
    targetRevision: main
    path: envs/production/mestier/rustfs
  destination:
    server: https://kubernetes.default.svc
    namespace: mestier
  syncPolicy:
    automated:
      # Stateful (PVC): don't auto-prune — removing from Git must not delete the
      # object-storage volume.
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
