apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ferriskey-db
  namespace: argocd
  annotations:
    # Sync-wave 0: the CNPG cluster must be Healthy before the Ferriskey chart
    # (wave 1) runs its PreSync migration job.
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/ferrislabs/mestier-infra
    targetRevision: main
    path: envs/production/ferriskey/db
  destination:
    server: https://kubernetes.default.svc
    namespace: ferriskey
  syncPolicy:
    automated:
      # Never auto-prune a stateful database: a Cluster removed from Git must not
      # trigger an automatic delete (would destroy data).
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
