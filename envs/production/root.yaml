apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mestier-production
  namespace: argocd
spec:
  project: default
  # App-of-apps root for the production environment: applying this single
  # Application deploys everything under envs/production/apps.
  source:
    repoURL: https://github.com/ferrislabs/mestier-infra
    targetRevision: main
    path: envs/production/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
