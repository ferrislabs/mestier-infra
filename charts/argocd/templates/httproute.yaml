{{- include "argocd.validate" . -}}
{{- if .Values.httpRoute.create }}
# Routes the ArgoCD host through the shared Envoy Gateway to argocd-server.
# The Gateway terminates TLS (HTTPS listener for {{ .Values.host }}); traffic to
# the backend is plain HTTP (server runs with server.insecure=true).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "argocd.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
  hostnames:
    - {{ .Values.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Values.httpRoute.serviceName }}
          port: {{ .Values.httpRoute.servicePort }}
{{- end }}
